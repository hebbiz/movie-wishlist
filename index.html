<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Wishlist</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container">
    <header>
      <h1>Movie Wishlist</h1>
      <p>Список фільмів для перегляду та покупки</p>
    </header>

    <div id="authPanel">
      <button id="loginButton" style="display:none;">
      Увійти через Google
      </button>

    <div id="userInfo" style="display:none;">
      <div class="user-menu">
        <button id="userMenuButton" type="button">
          <span id="userEmail"></span>
          <span class="user-menu-arrow">▾</span>
        </button>

       <div id="userMenuDropdown" class="user-menu-dropdown">
        <button id="addUsernameButton" type="button">Додати юзернейм</button>
        <button id="logoutButton" type="button">Вийти</button>
       </div>
     </div>
    </div>

    <section class="panel">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Пошук..." />
         <button id="clearSearchButton" type="button" aria-label="Очистити пошук"></button>
      </div>
      <p id="searchHint" class="search-hint"></p>
    </section>

    <section class="panel filters">
      <button type="button" class="filter-btn active" data-filter="all">Усі</button>
      <button type="button" class="filter-btn" data-filter="wishlist">Хочу переглянути</button>
      <button type="button" class="filter-btn" data-filter="ordered">Замовлено</button>
      <button type="button" class="filter-btn" data-filter="owned">Придбано</button>
      <button type="button" class="filter-btn" data-filter="watched">Переглянуто</button>
    </section>

    <section class="panel actions-panel">
      <button id="showAddFormButton" type="button">Додати</button>
    </section>

    <section class="panel" id="formPanel" style="display: none;">
      <h2 id="formTitle">Додати фільм</h2>

    <form id="movieForm">

      <form id="movieForm">
        <input id="title" type="text" placeholder="Назва фільму" required />
        <input id="year" type="number" placeholder="Рік" />
        <input id="imdb_url" type="url" placeholder="IMDb посилання" />
        <button id="lookupButton" type="button">Заповнити з IMDb</button>
        <input id="poster_url" type="url" placeholder="Посилання на постер" />

        <select id="status">
         <option value="wishlist">Хочу переглянути</option>
         <option value="ordered">Замовлено</option>
         <option value="owned">Придбано</option>
         <option value="watched">Переглянуто</option>
        </select>

        <div id="recommendedMediumGroup">
  <select id="recommended_medium">
    <option value="">Рекомендований носій</option>
    <option value="4K UHD Blu-ray">4K UHD Blu-ray</option>
    <option value="Blu-ray">Blu-ray</option>
    <option value="Apple TV / iTunes">Apple TV / iTunes</option>
    <option value="Netflix">Netflix</option>
    <option value="HBO Max">HBO Max</option>
    <option value="Prime Video">Prime Video</option>
    <option value="Disney+">Disney+</option>
    <option value="Megogo">Megogo</option>
    <option value="Наразі недоступний">Наразі недоступний</option>
  </select>
</div>

<div id="ownedMediumGroup" style="display: none;">
  <select id="owned_medium">
    <option value="">На якому носії придбано</option>
    <option value="4K UHD Blu-ray">4K UHD Blu-ray</option>
    <option value="Blu-ray">Blu-ray</option>
    <option value="Apple TV / iTunes">Apple TV / iTunes</option>
    <option value="Netflix">Netflix</option>
    <option value="HBO Max">HBO Max</option>
    <option value="Prime Video">Prime Video</option>
    <option value="Disney+">Disney+</option>
    <option value="Megogo">Megogo</option>
    <option value="Інше">Інше</option>
  </select>
</div>

<div id="purchaseGroup">
  <label id="purchaseLabel" for="purchase_url">Де купити / рекомендоване посилання</label>
  <input id="purchase_url" type="url" placeholder="https://..." />
</div>
        
        <input id="added_by" type="text" placeholder="Хто додав" />
        <textarea id="notes" placeholder="Нотатки"></textarea>

        <button id="submitButton" type="submit">Додати</button>
        <button id="cancelEditButton" type="button">
         ← Повернутись до списку
        </button>
      </form>
    </section>

    <section>
      <h2>Список фільмів
        <span id="movieCount">(0)</span>
      </h2>
      <div id="moviesGrid" class="grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
